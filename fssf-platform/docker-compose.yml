# Convenience: spins up a local Postgres instance for development.
# Run: docker compose up -d
# Then point backend/.env DATABASE_URL at postgres://fssf_user:fssf_pass@localhost:5432/fssf_db
version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fssf_user
      POSTGRES_PASSWORD: fssf_pass
      POSTGRES_DB: fssf_db
    ports:
      - "5432:5432"
    volumes:
      - fssf_pg_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
volumes:
  fssf_pg_data:
